name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  web-and-api:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install web dependencies
        run: npm ci

      - name: Install OCR API dependencies
        run: pip install -e services/ocr-api[dev]

      - name: Typecheck
        run: npm run typecheck

      - name: Build web
        run: npm run build:web

      - name: Run tests
        run: npm run test

      - name: Compile Python API
        run: python -m compileall services/ocr-api/app
